<svg width="100%" height="60" viewBox="0 0 680 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Decorative Kenyan-inspired pattern divider">
<defs>
<pattern id="triband" width="40" height="60" patternUnits="userSpaceOnUse">
<rect width="40" height="60" fill="#faf6ec"/>
<polygon points="0,10 20,10 10,40" fill="#152e20"/>
<circle cx="10" cy="20" r="2.5" fill="#faf6ec"/>
<polygon points="20,40 40,40 30,10" fill="#b5182a"/>
<circle cx="30" cy="30" r="2.5" fill="#faf6ec"/>
</pattern>
<pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(90)">
<rect width="10" height="10" fill="#152e20"/>
<rect width="10" height="2" fill="#c89a0e"/>
<rect y="4" width="10" height="2" fill="#b5182a"/>
<rect y="8" width="10" height="2" fill="#4a8c5c"/>
</pattern>
</defs>
<rect x="0" y="20" width="18" height="60" fill="url(#stripes)"/>
<rect x="18" y="20" width="644" height="60" fill="url(#triband)"/>
<rect x="662" y="20" width="18" height="60" fill="url(#stripes)"/>
</svg>
